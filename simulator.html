<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Playground</title>
<link rel="stylesheet" href="assets/common.css">
<link rel="stylesheet" href="assets/simulator.css">
</head>
<body>

<div id="toolbar">
  <a class="home-link" href="index.html">&#8592; Back</a>
  <div class="sep"></div>
  <button id="btn-play" class="primary">&#9654; Play</button>
  <div class="sep"></div>
  <button id="btn-reset" title="Stop and clear trails">&#8635; Reset</button>
  <button class="danger" id="btn-clear" title="Remove all bodies">&#8855; Clear</button>
  <div class="sep"></div>
  <span class="tlbl">Speed</span>
  <input type="range" id="speed-sl" min="1" max="10" value="1">
  <span class="tlbl" id="speed-lbl">1&times;</span>
  <div class="sep"></div>
  <label class="cb">
    <input type="checkbox" id="merge-cb" checked style="accent-color:var(--accent)">
    Merge on collision
  </label>
  <div class="sep"></div>
  <span class="tlbl">Preset:</span>
  <select id="preset-select">
    <option value="">&#8212; choose &#8212;</option>
    <option value="binary">Binary Stars</option>
    <option value="threebody">Equilateral 3-Body</option>
    <option value="figure8">Figure-8 Orbit</option>
    <option value="solar">Solar System</option>
    <option value="chaos">Chaos (8 Bodies)</option>
    <option value="earthmoon">Sun, Earth &amp; Moon</option>
  </select>
  <label class="theme-toggle" title="Switch between dark and light mode">
    <span>Light mode</span>
    <input type="checkbox" id="theme-toggle">
    <span class="theme-switch" aria-hidden="true"></span>
  </label>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="hint">Click to place &middot; Drag to set velocity &middot; Right-drag to pan &middot; Scroll to zoom &middot; Middle-click to fit</div>
  </div>

  <div id="sidebar">
    <div class="sec-head">Bodies <span id="body-count">0</span></div>
    <div id="body-list"></div>

    <div id="editor">
      <div class="etitle">Properties</div>
      <div id="econtent"><div class="no-sel">Click a body to edit</div></div>
    </div>

    <div id="stats">
      <div class="stat">n=<b id="s-n">0</b></div>
      <div class="stat">t=<b id="s-t">0</b></div>
      <div class="stat">KE=<b id="s-ke">0</b></div>
    </div>
  </div>
</div>

<script src="assets/theme.js"></script>
<script src="assets/ui.js"></script>
<script src="assets/simulator.js"></script>
</body>
</html>
