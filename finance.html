<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Timeline</title>
<!-- Pinned CDN dependencies: Chart.js, Hammer.js, and chartjs-plugin-zoom. -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script>if (window.Chart && window.ChartZoom) Chart.register(ChartZoom);</script>
<link rel="stylesheet" href="assets/common.css">
<link rel="stylesheet" href="assets/finance.css">
</head>
<body>

<div id="topbar">
  <a href="index.html">&#8592; Back</a>
  <span class="sep">|</span>
  <h1>&#128200; Finance Timeline</h1>
  <label class="theme-toggle" title="Switch between dark and light mode">
    <span>Light mode</span>
    <input type="checkbox" id="theme-toggle">
    <span class="theme-switch" aria-hidden="true"></span>
  </label>
</div>

<div id="layout">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sb-header">
      <span>Positions</span>
      <button class="btn-add" id="btn-add-account">+ Add</button>
    </div>
    <div id="account-list"></div>
  </div>

  <!-- ── Chart area ── -->
  <div id="main">
    <div id="chart-controls">
      <span class="ctrl-label">Forecast:</span>
      <div class="ctrl-group">
        <button class="ctrl-btn active" data-range="1y">+1Y</button>
        <button class="ctrl-btn" data-range="3y">+3Y</button>
        <button class="ctrl-btn" data-range="5y">+5Y</button>
        <button class="ctrl-btn" data-range="10y">+10Y</button>
        <button class="ctrl-btn" data-range="all">+30Y</button>
      </div>
      <span class="ctrl-label">Navigate:</span>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btn-reset-zoom">Reset Zoom</button>
      </div>
      <span class="chart-help">Scroll to zoom &middot; drag to pan &middot; pinch on touch</span>
    </div>
    <div id="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>
</div>

<!-- ── Add/Edit Account Modal ── -->
<div class="modal-overlay" id="account-modal">
  <div class="modal">
    <h2 id="modal-title">Add Position</h2>
    <div class="type-tabs">
      <button class="type-tab active investment" data-type="investment">&#128200; Investment</button>
      <button class="type-tab loan"              data-type="loan"      >&#127968; Loan</button>
    </div>
    <div class="form-row">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="e.g. Home Loan, S&amp;P 500 Fund">
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label id="f-principal-label">Starting Value ($)</label>
        <input type="number" id="f-principal" placeholder="100000" min="0" step="0.01">
      </div>
      <div class="form-row">
        <label>Start Date</label>
        <input type="date" id="f-startdate">
      </div>
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label>Interest Rate (% p.a.)</label>
        <input type="number" id="f-rate" placeholder="5.5" min="0" step="0.01">
      </div>
      <div class="form-row">
        <label>Compounding</label>
        <select id="f-compound">
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="annually">Annually</option>
          <option value="continuous">Continuous</option>
        </select>
      </div>
    </div>
    <div id="loan-only-fields">
      <div class="form-row">
        <label>Loan Term (years)</label>
        <input type="number" id="f-term" placeholder="30" min="1" step="1">
      </div>
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label id="f-payment-label">Regular Repayment ($)</label>
        <input type="number" id="f-payment" placeholder="auto-calc" min="0" step="0.01">
        <div class="hint" id="f-payment-hint">Leave blank to auto-calculate</div>
      </div>
      <div class="form-row">
        <label>Frequency</label>
        <select id="f-payment-freq">
          <option value="">None</option>
          <option value="52">Weekly</option>
          <option value="26">Fortnightly</option>
          <option value="12" selected>Monthly</option>
          <option value="4">Quarterly</option>
          <option value="1">Annually</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Colour</label>
      <input type="color" id="f-color" value="#4a9eff" style="height:38px;cursor:pointer;padding:2px 4px;">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" data-close-modal="account-modal">Cancel</button>
      <button class="btn-primary" id="btn-save-account">Save</button>
    </div>
  </div>
</div>

<!-- ── Add Keypoint Modal ── -->
<div class="modal-overlay" id="keypoint-modal">
  <div class="modal">
    <h2>Add Event</h2>
    <input type="hidden" id="kp-acc-id">
    <div class="form-row">
      <label>Date</label>
      <input type="date" id="kp-date">
    </div>
    <div class="form-row">
      <label>Event Type</label>
      <select id="kp-type">
        <option value="rate_change">Rate Change</option>
        <option value="payment_change">Payment Change</option>
        <option value="extra_payment">Extra Payment / Withdrawal</option>
        <option value="lump_sum">Lump Sum Deposit</option>
        <option value="note">Note / Milestone</option>
      </select>
    </div>
    <div id="kp-value-row" class="form-row">
      <label id="kp-value-label">New Rate (% p.a.)</label>
      <input type="number" id="kp-value" placeholder="0" step="0.01">
    </div>
    <div id="kp-payment-mode-row" class="form-row" style="display:none">
      <label>Repayment after rate change</label>
      <select id="kp-payment-mode">
        <option value="auto">Recalculate for remaining term</option>
        <option value="keep">Keep same repayment</option>
        <option value="set">Set specific amount</option>
      </select>
    </div>
    <div id="kp-new-payment-row" class="form-row" style="display:none">
      <label id="kp-new-payment-label">New Repayment ($)</label>
      <input type="number" id="kp-new-payment" placeholder="0.00" min="0" step="0.01">
      <div class="hint">Leave blank to keep unchanged</div>
    </div>
    <div class="form-row">
      <label>Note (optional)</label>
      <input type="text" id="kp-note" placeholder="e.g. RBA rate cut">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" data-close-modal="keypoint-modal">Cancel</button>
      <button class="btn-primary" id="kp-save-btn">Add Event</button>
    </div>
  </div>
</div>

<script src="assets/theme.js"></script>
<script src="assets/storage.js"></script>
<script src="assets/finance-calculations.js"></script>
<script src="assets/finance.js"></script>
</body>
</html>
