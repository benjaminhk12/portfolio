<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Timeline</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:     #06060f;
    --panel:  #0c0c1a;
    --border: #1c1e38;
    --accent: #4a9eff;
    --text:   #c0cce0;
    --dim:    #50587a;
    --green:  #4aff9e;
    --red:    #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Topbar ── */
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--panel); flex-shrink: 0;
  }
  #topbar a { color: var(--dim); text-decoration: none; font-size: 13px; }
  #topbar a:hover { color: var(--accent); }
  #topbar h1 { font-size: 16px; font-weight: 600; color: #d8e8ff; }
  .sep { color: var(--border); }

  /* ── Layout ── */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 290px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sb-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .sb-header span { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); font-weight: 700; }
  .btn-add {
    background: var(--accent); color: #06060f; border: none;
    border-radius: 6px; padding: 5px 13px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .btn-add:hover { opacity: 0.85; }
  #account-list { flex: 1; overflow-y: auto; padding: 8px; }

  /* ── Account Cards ── */
  .account-item {
    border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    margin-bottom: 8px; transition: border-color .15s;
  }
  .account-item:hover { border-color: rgba(74,158,255,0.4); }
  .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ai-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ai-name { font-size: 14px; font-weight: 600; color: #d8e8ff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ai-type { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .ai-type.loan       { background: rgba(255,107,107,0.12); color: var(--red);   border: 1px solid rgba(255,107,107,0.2); }
  .ai-type.investment { background: rgba(74,255,158,0.1);   color: var(--green); border: 1px solid rgba(74,255,158,0.2); }
  .ai-meta { font-size: 11px; color: var(--dim); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .ai-val { font-size: 18px; font-weight: 700; margin: 6px 0; }
  .ai-val.loan       { color: var(--red); }
  .ai-val.investment { color: var(--green); }
  .ai-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-sm {
    font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text);
    transition: border-color .12s, color .12s;
  }
  .btn-sm:hover        { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--red);    color: var(--red); }

  .kp-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  .kp-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin-bottom: 6px; font-weight: 700; }
  .kp-item { display: flex; align-items: flex-start; gap: 7px; font-size: 11px; color: var(--dim); padding: 2px 0; }
  .kp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 3px; }
  .kp-del { margin-left: auto; cursor: pointer; color: var(--dim); font-size: 13px; line-height: 1; background: none; border: none; padding: 0 2px; flex-shrink: 0; }
  .kp-del:hover { color: var(--red); }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 16px; gap: 12px; }

  #chart-controls {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .ctrl-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
  .ctrl-group { display: flex; gap: 4px; }
  .ctrl-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--dim);
    transition: all .12s;
  }
  .ctrl-btn:hover, .ctrl-btn.active {
    border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.08);
  }
  .toggles { display: flex; gap: 14px; margin-left: auto; align-items: center; }
  .toggle-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); cursor: pointer; user-select: none; }
  .toggle-item input { accent-color: var(--accent); cursor: pointer; }

  #chart-wrap {
    flex: 1; min-height: 0;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; position: relative;
  }

  /* ── Modals ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; width: 440px;
    max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 700; color: #d8e8ff; margin-bottom: 20px; }

  .type-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .type-tab {
    flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center;
    border: 1px solid var(--border); font-size: 13px; font-weight: 600;
    background: transparent; color: var(--dim); transition: all .12s;
  }
  .type-tab.active.investment { border-color: var(--green); color: var(--green); background: rgba(74,255,158,0.07); }
  .type-tab.active.loan       { border-color: var(--red);   color: var(--red);   background: rgba(255,107,107,0.07); }

  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; font-weight: 600; }
  .form-row input, .form-row select {
    width: 100%; padding: 9px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-size: 14px; outline: none; transition: border-color .12s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .form-row select option { background: var(--bg); }
  .form-row .hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-primary {
    background: var(--accent); color: #06060f; border: none;
    border-radius: 7px; padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-cancel {
    background: transparent; color: var(--dim); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 16px; font-size: 13px; cursor: pointer;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--dim); }

  /* ── Empty state ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 10px; color: var(--dim); text-align: center;
  }
  .empty-state .es-icon { font-size: 44px; opacity: 0.25; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
</style>
</head>
<body>

<div id="topbar">
  <a href="index.html">&#8592; Back</a>
  <span class="sep">|</span>
  <h1>&#128200; Finance Timeline</h1>
</div>

<div id="layout">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sb-header">
      <span>Positions</span>
      <button class="btn-add" onclick="openAddAccount()">+ Add</button>
    </div>
    <div id="account-list"></div>
  </div>

  <!-- ── Chart area ── -->
  <div id="main">
    <div id="chart-controls">
      <span class="ctrl-label">Forecast:</span>
      <div class="ctrl-group">
        <button class="ctrl-btn active" onclick="setRange('1y',this)">+1Y</button>
        <button class="ctrl-btn" onclick="setRange('3y',this)">+3Y</button>
        <button class="ctrl-btn" onclick="setRange('5y',this)">+5Y</button>
        <button class="ctrl-btn" onclick="setRange('10y',this)">+10Y</button>
        <button class="ctrl-btn" onclick="setRange('all',this)">+30Y</button>
      </div>
      <div class="toggles">
        <label class="toggle-item">
          <input type="checkbox" id="show-projected" checked onchange="redraw()"> Projected
        </label>
        <label class="toggle-item">
          <input type="checkbox" id="show-actual" checked onchange="redraw()"> Actual
        </label>
      </div>
    </div>
    <div id="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>
</div>

<!-- ── Add/Edit Account Modal ── -->
<div class="modal-overlay" id="account-modal">
  <div class="modal">
    <h2 id="modal-title">Add Position</h2>
    <div class="type-tabs">
      <button class="type-tab active investment" data-type="investment" onclick="selectType('investment',this)">&#128200; Investment</button>
      <button class="type-tab loan"              data-type="loan"       onclick="selectType('loan',this)">&#127968; Loan</button>
    </div>
    <div class="form-row">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="e.g. Home Loan, S&amp;P 500 Fund">
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label id="f-principal-label">Starting Value ($)</label>
        <input type="number" id="f-principal" placeholder="100000" min="0" step="0.01">
      </div>
      <div class="form-row">
        <label>Start Date</label>
        <input type="date" id="f-startdate">
      </div>
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label>Interest Rate (% p.a.)</label>
        <input type="number" id="f-rate" placeholder="5.5" min="0" step="0.01">
      </div>
      <div class="form-row">
        <label>Compounding</label>
        <select id="f-compound">
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="annually">Annually</option>
          <option value="continuous">Continuous</option>
        </select>
      </div>
    </div>
    <div id="loan-only-fields">
      <div class="form-row">
        <label>Loan Term (years)</label>
        <input type="number" id="f-term" placeholder="30" min="1" step="1">
      </div>
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label id="f-payment-label">Regular Repayment ($)</label>
        <input type="number" id="f-payment" placeholder="auto-calc" min="0" step="0.01">
        <div class="hint" id="f-payment-hint">Leave blank to auto-calculate</div>
      </div>
      <div class="form-row">
        <label>Frequency</label>
        <select id="f-payment-freq">
          <option value="">None</option>
          <option value="52">Weekly</option>
          <option value="26">Fortnightly</option>
          <option value="12" selected>Monthly</option>
          <option value="4">Quarterly</option>
          <option value="1">Annually</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Colour</label>
      <input type="color" id="f-color" value="#4a9eff" style="height:38px;cursor:pointer;padding:2px 4px;">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('account-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveAccount()">Save</button>
    </div>
  </div>
</div>

<!-- ── Add Keypoint Modal ── -->
<div class="modal-overlay" id="keypoint-modal">
  <div class="modal">
    <h2>Add Event</h2>
    <input type="hidden" id="kp-acc-id">
    <div class="form-row">
      <label>Date</label>
      <input type="date" id="kp-date">
    </div>
    <div class="form-row">
      <label>Event Type</label>
      <select id="kp-type" onchange="onKpTypeChange()">
        <option value="rate_change">Rate Change</option>
        <option value="extra_payment">Extra Payment / Withdrawal</option>
        <option value="lump_sum">Lump Sum Deposit</option>
        <option value="note">Note / Milestone</option>
      </select>
    </div>
    <div id="kp-value-row" class="form-row">
      <label id="kp-value-label">New Rate (% p.a.)</label>
      <input type="number" id="kp-value" placeholder="0" step="0.01">
    </div>
    <div class="form-row">
      <label>Note (optional)</label>
      <input type="text" id="kp-note" placeholder="e.g. RBA rate cut">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('keypoint-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveKeypoint()">Add Event</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────
let accounts = JSON.parse(localStorage.getItem('ft_accounts') || '[]');
let chartRange = '1y';
let editingId = null;
let editingType = 'investment';
let myChart = null;

const PALETTE = ['#4a9eff','#4aff9e','#ff6b6b','#ffcc4a','#c47aff','#ff9f4a','#4affee','#ff4aaa'];

function save() { localStorage.setItem('ft_accounts', JSON.stringify(accounts)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ─── Formatting ───────────────────────────────────────────────────────────────
function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  const abs = Math.abs(v);
  const prefix = v < 0 ? '-$' : '$';
  if (abs >= 1e6)  return prefix + (abs/1e6).toFixed(2) + 'M';
  if (abs >= 1e3)  return prefix + (abs/1e3).toFixed(1) + 'k';
  return prefix + abs.toFixed(2);
}

function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-NZ', { year:'numeric', month:'short', day:'numeric' });
}

// ─── Financial calculations ───────────────────────────────────────────────────
function compoundValue(principal, annualRate, compound, fromDate, toDate, type, payment, termYears, paymentFreq) {
  const MS_YEAR = 365.25 * 24 * 3600 * 1000;
  const years = (toDate - fromDate) / MS_YEAR;
  if (years < 0) return principal;
  if (years === 0) return principal;

  if (type === 'investment') {
    // Base compound growth on principal
    let base;
    if (compound === 'continuous') {
      base = principal * Math.exp(annualRate * years);
    } else {
      const n = compound === 'monthly' ? 12 : compound === 'quarterly' ? 4 : 1;
      base = principal * Math.pow(1 + annualRate / n, n * years);
    }
    // Future value of regular contributions (ordinary annuity)
    if (payment && paymentFreq) {
      const r = annualRate / paymentFreq;
      const nPeriods = years * paymentFreq;
      base += r === 0
        ? payment * nPeriods
        : payment * (Math.pow(1 + r, nPeriods) - 1) / r;
    }
    return base;
  }

  // Loan – amortising with payment frequency
  const freq = paymentFreq || 12;
  const r = annualRate / freq;
  const nPeriods = years * freq;
  const N = (termYears || 30) * freq;
  if (r === 0) {
    const pmt = payment || principal / N;
    return Math.max(0, principal - pmt * nPeriods);
  }
  const pmt = payment || (principal * r * Math.pow(1+r, N)) / (Math.pow(1+r, N) - 1);
  const balance = principal * Math.pow(1+r, nPeriods) - pmt * (Math.pow(1+r, nPeriods) - 1) / r;
  return Math.max(0, balance);
}

function calcValue(acc, dateStr, withKeypoints) {
  const accStart = new Date(acc.startDate + 'T00:00:00');
  const target   = new Date(dateStr + 'T00:00:00');
  if (target < accStart) return null;

  const pf = acc.paymentFreq || null;

  if (!withKeypoints) {
    return compoundValue(acc.principal, acc.rate/100, acc.compound, accStart, target, acc.type, acc.payment, acc.term, pf);
  }

  // Replay segments defined by keypoints
  const kps = [...acc.keypoints]
    .filter(k => k.date >= acc.startDate && k.date <= dateStr && k.type !== 'note')
    .sort((a, b) => a.date.localeCompare(b.date));

  let P = acc.principal, r = acc.rate/100, cpd = acc.compound, segStart = accStart;

  for (const kp of kps) {
    const kpDate = new Date(kp.date + 'T00:00:00');
    if (kpDate <= segStart) continue;
    const valAtKp = compoundValue(P, r, cpd, segStart, kpDate, acc.type, acc.payment, acc.term, pf);
    if (kp.type === 'rate_change') {
      P = valAtKp; r = kp.value / 100; segStart = kpDate;
    } else if (kp.type === 'extra_payment') {
      P = Math.max(0, valAtKp - kp.value); segStart = kpDate;
    } else if (kp.type === 'lump_sum') {
      P = valAtKp + kp.value; segStart = kpDate;
    }
  }

  return compoundValue(P, r, cpd, segStart, target, acc.type, acc.payment, acc.term, pf);
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('account-list');
  if (accounts.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">💼</div>
        <p>No positions yet.<br>Add a loan or investment to get started.</p>
      </div>`;
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  list.innerHTML = accounts.map(acc => {
    const val = calcValue(acc, today, true);
    const kpHtml = acc.keypoints.length
      ? `<div class="kp-section">
           <div class="kp-section-title">Events</div>
           ${[...acc.keypoints].sort((a,b)=>a.date.localeCompare(b.date)).map(kp => `
             <div class="kp-item">
               <div class="kp-dot"></div>
               <span>${fmtDate(kp.date)} &mdash; ${kpLabel(kp)}</span>
               <button class="kp-del" title="Remove event" onclick="deleteKeypoint('${acc.id}','${kp.id}');event.stopPropagation()">&#215;</button>
             </div>`).join('')}
         </div>` : '';

    return `
      <div class="account-item">
        <div class="ai-header">
          <div class="ai-dot" style="background:${acc.color}"></div>
          <div class="ai-name" title="${acc.name}">${acc.name}</div>
          <span class="ai-type ${acc.type}">${acc.type}</span>
        </div>
        <div class="ai-meta">
          <span>From ${fmtDate(acc.startDate)}</span>
          <span>${acc.rate}% p.a.</span>
          ${acc.payment && acc.paymentFreq ? `<span>${fmt(acc.payment)} ${freqLabel(acc.paymentFreq)}</span>` : ''}
        </div>
        <div class="ai-val ${acc.type}">${fmt(val)}</div>
        ${kpHtml}
        <div class="ai-actions">
          <button class="btn-sm" onclick="openAddKeypoint('${acc.id}')">+ Event</button>
          <button class="btn-sm" onclick="editAccount('${acc.id}')">Edit</button>
          <button class="btn-sm danger" onclick="deleteAccount('${acc.id}')">Delete</button>
        </div>
      </div>`;
  }).join('');
}

function freqLabel(freq) {
  return freq == 52 ? '/wk' : freq == 26 ? '/fn' : freq == 12 ? '/mo' : freq == 4 ? '/qtr' : '/yr';
}

function kpLabel(kp) {
  const n = kp.note ? ` (${kp.note})` : '';
  if (kp.type === 'rate_change')   return `Rate → ${kp.value}%${n}`;
  if (kp.type === 'extra_payment') return `Payment ${fmt(kp.value)}${n}`;
  if (kp.type === 'lump_sum')      return `Deposit ${fmt(kp.value)}${n}`;
  return kp.note || 'Note';
}

// ─── Chart ────────────────────────────────────────────────────────────────────
function getRange() {
  const now = new Date();
  // Always start from the earliest account's start date so past data is visible
  const start = accounts.length
    ? new Date(accounts.reduce((m,a) => a.startDate < m ? a.startDate : m, accounts[0].startDate) + 'T00:00:00')
    : new Date(now);
  // End N years *forward* from today — finance tracker projects into the future
  const y = chartRange === 'all' ? 30 : parseInt(chartRange);
  const end = new Date(now.getFullYear() + y, now.getMonth(), now.getDate());
  return { start, end };
}

function buildDates(start, end, extraDates = []) {
  const dates = [], MS_MONTH = 30.4375 * 24 * 3600 * 1000;
  let cur = new Date(start);
  while (cur <= end) { dates.push(cur.toISOString().slice(0,10)); cur = new Date(cur.getTime() + MS_MONTH); }
  const last = end.toISOString().slice(0,10);
  if (dates[dates.length-1] !== last) dates.push(last);
  // Inject keypoint dates so markers land exactly on those points
  const startStr = start.toISOString().slice(0,10), endStr = last;
  for (const d of extraDates) {
    if (d >= startStr && d <= endStr && !dates.includes(d)) dates.push(d);
  }
  dates.sort();
  return dates;
}

function hexRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function redraw() {
  const showP = document.getElementById('show-projected').checked;
  const showA = document.getElementById('show-actual').checked;

  if (myChart) { myChart.destroy(); myChart = null; }

  if (!accounts.length) return;

  const { start, end } = getRange();
  const allKpDates = accounts.flatMap(acc => acc.keypoints.map(k => k.date));
  const dates = buildDates(start, end, allKpDates);
  const datasets = [];

  for (const acc of accounts) {
    const project = dates.map(d => { const v = calcValue(acc,d,false); return v!=null ? +v.toFixed(2) : null; });
    const actual  = dates.map(d => { const v = calcValue(acc,d,true);  return v!=null ? +v.toFixed(2) : null; });

    // Keypoint dates are now exact matches in the dates array
    const kpDateSet = new Set(acc.keypoints.map(k => k.date));
    const kpRadii   = dates.map(d => kpDateSet.has(d) ? 6 : 0);
    const kpBg      = dates.map(d => kpDateSet.has(d) ? '#ffffff' : 'transparent');
    const kpHover   = dates.map(d => kpDateSet.has(d) ? 8 : 4);

    if (showP) datasets.push({
      label: acc.name + ' (Projected)',
      data: project,
      borderColor: acc.color,
      backgroundColor: 'transparent',
      borderDash: [6,4],
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.35,
      spanGaps: true,
    });

    if (showA) datasets.push({
      label: acc.name + ' (Actual)',
      data: actual,
      borderColor: acc.color,
      backgroundColor: hexRgba(acc.color, 0.07),
      fill: true,
      borderWidth: 2,
      pointRadius: kpRadii,
      pointHoverRadius: kpHover,
      pointBackgroundColor: kpBg,
      pointBorderColor: acc.color,
      pointBorderWidth: 2,
      tension: 0.35,
      spanGaps: true,
    });
  }

  const ctx = document.getElementById('chart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#c0cce0', font: { size: 12 }, boxWidth: 22, padding: 14 },
        },
        tooltip: {
          backgroundColor: '#0d0d1e',
          borderColor: '#1c1e38',
          borderWidth: 1,
          titleColor: '#d8e8ff',
          bodyColor: '#c0cce0',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}`,
            afterBody: items => {
              if (!items.length) return [];
              const date = dates[items[0].dataIndex];
              const lines = [];
              for (const acc of accounts) {
                for (const kp of acc.keypoints) {
                  if (kp.date === date) lines.push(`  ⬥ ${acc.name}: ${kpLabel(kp)}`);
                }
              }
              return lines.length ? ['', ...lines] : [];
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#50587a', maxTicksLimit: 10, font: { size: 11 } },
          grid:  { color: 'rgba(28,30,56,0.9)' },
        },
        y: {
          ticks: { color: '#50587a', font: { size: 11 }, callback: v => fmt(v) },
          grid:  { color: 'rgba(28,30,56,0.9)' },
        }
      }
    }
  });
}

function setRange(range, btn) {
  chartRange = range;
  document.querySelectorAll('#chart-controls .ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  redraw();
}

// ─── Account modal ────────────────────────────────────────────────────────────
function openAddAccount() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Position';
  document.getElementById('f-name').value = '';
  document.getElementById('f-principal').value = '';
  document.getElementById('f-startdate').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-rate').value = '';
  document.getElementById('f-compound').value = 'monthly';
  document.getElementById('f-term').value = '';
  document.getElementById('f-payment').value = '';
  document.getElementById('f-payment-freq').value = '12';
  document.getElementById('f-color').value = PALETTE[accounts.length % PALETTE.length];
  selectType('investment', document.querySelector('.type-tab[data-type="investment"]'));
  openModal('account-modal');
}

function editAccount(id) {
  const acc = accounts.find(a => a.id === id);
  if (!acc) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Position';
  document.getElementById('f-name').value = acc.name;
  document.getElementById('f-principal').value = acc.principal;
  document.getElementById('f-startdate').value = acc.startDate;
  document.getElementById('f-rate').value = acc.rate;
  document.getElementById('f-compound').value = acc.compound;
  document.getElementById('f-term').value = acc.term || '';
  document.getElementById('f-payment').value = acc.payment || '';
  document.getElementById('f-payment-freq').value = acc.paymentFreq || '';
  document.getElementById('f-color').value = acc.color;
  selectType(acc.type, document.querySelector(`.type-tab[data-type="${acc.type}"]`));
  openModal('account-modal');
}

function saveAccount() {
  const name        = document.getElementById('f-name').value.trim();
  const principal   = parseFloat(document.getElementById('f-principal').value);
  const startDate   = document.getElementById('f-startdate').value;
  const rate        = parseFloat(document.getElementById('f-rate').value);
  const compound    = document.getElementById('f-compound').value;
  const term        = parseFloat(document.getElementById('f-term').value)    || null;
  const payment     = parseFloat(document.getElementById('f-payment').value) || null;
  const paymentFreq = parseInt(document.getElementById('f-payment-freq').value) || null;
  const color       = document.getElementById('f-color').value;

  if (!name || isNaN(principal) || !startDate || isNaN(rate)) {
    alert('Please fill in Name, Value, Start Date, and Rate.'); return;
  }

  if (editingId) {
    Object.assign(accounts.find(a => a.id === editingId), { name, principal, startDate, rate, compound, term, payment, paymentFreq, color, type: editingType });
  } else {
    accounts.push({ id: uid(), name, type: editingType, principal, startDate, rate, compound, term, payment, paymentFreq, color, keypoints: [] });
  }

  save(); closeModal('account-modal'); renderSidebar(); redraw();
}

function deleteAccount(id) {
  if (!confirm('Delete this position and all its events?')) return;
  accounts = accounts.filter(a => a.id !== id);
  save(); renderSidebar(); redraw();
}

function selectType(type, btn) {
  editingType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('loan-only-fields').style.display        = type === 'loan' ? '' : 'none';
  document.getElementById('f-principal-label').textContent         = type === 'loan' ? 'Loan Amount ($)' : 'Starting Value ($)';
  document.getElementById('f-payment-label').textContent           = type === 'loan' ? 'Regular Repayment ($)' : 'Regular Contribution ($)';
  document.getElementById('f-payment-hint').textContent            = type === 'loan' ? 'Leave blank to auto-calculate' : 'Leave blank for no contributions';
  document.getElementById('f-payment').placeholder                 = type === 'loan' ? 'auto-calc' : '0.00';
}

// ─── Keypoint modal ───────────────────────────────────────────────────────────
function openAddKeypoint(accId) {
  document.getElementById('kp-acc-id').value = accId;
  document.getElementById('kp-date').value   = new Date().toISOString().slice(0,10);
  document.getElementById('kp-type').value   = 'rate_change';
  document.getElementById('kp-value').value  = '';
  document.getElementById('kp-note').value   = '';
  onKpTypeChange();
  openModal('keypoint-modal');
}

function onKpTypeChange() {
  const type = document.getElementById('kp-type').value;
  const row  = document.getElementById('kp-value-row');
  const lbl  = document.getElementById('kp-value-label');
  if (type === 'note') { row.style.display = 'none'; return; }
  row.style.display = '';
  lbl.textContent =
    type === 'rate_change'   ? 'New Rate (% p.a.)' :
    type === 'extra_payment' ? 'Payment / Withdrawal Amount ($)' :
                               'Deposit Amount ($)';
}

function saveKeypoint() {
  const accId = document.getElementById('kp-acc-id').value;
  const date  = document.getElementById('kp-date').value;
  const type  = document.getElementById('kp-type').value;
  const value = parseFloat(document.getElementById('kp-value').value) || 0;
  const note  = document.getElementById('kp-note').value.trim();
  if (!date) { alert('Please select a date.'); return; }

  const acc = accounts.find(a => a.id === accId);
  if (!acc) return;
  acc.keypoints.push({ id: uid(), date, type, value, note });
  save(); closeModal('keypoint-modal'); renderSidebar(); redraw();
}

function deleteKeypoint(accId, kpId) {
  const acc = accounts.find(a => a.id === accId);
  if (!acc) return;
  acc.keypoints = acc.keypoints.filter(k => k.id !== kpId);
  save(); renderSidebar(); redraw();
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

// ─── Boot ─────────────────────────────────────────────────────────────────────
renderSidebar();
redraw();
</script>
</body>
</html>
